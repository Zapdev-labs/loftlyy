[build]
builder = "railpack"
# Use npm to avoid pnpm version availability issues in Railway's aqua registry.
# tsup bundles all runtime deps so node_modules is only needed at build time.
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "node mcp-server/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
